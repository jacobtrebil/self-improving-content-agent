<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px}
.slide{width:1080px;height:1920px;background:#0e3b24;color:#f6fcf8;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
  padding:96px;display:flex;flex-direction:column;position:relative;overflow:hidden;
  -webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;justify-content:space-between}
.eyebrow{font-size:24px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:#7fae93}
.prog{font-size:24px;font-weight:700;letter-spacing:2px;color:#7fae93}
.spacer{flex:1}
.idx{font-size:240px;font-weight:800;line-height:0.85;letter-spacing:-4px;color:#15492f;margin-bottom:8px}
.h-cover{font-size:88px;font-weight:800;line-height:1.04;letter-spacing:-2px}
.h-content{font-size:60px;font-weight:800;line-height:1.08;letter-spacing:-1px;margin-bottom:30px}
.sub{font-size:32px;font-weight:500;line-height:1.45;color:#b9d8c6;margin-top:34px;max-width:840px}
.body{font-size:32px;font-weight:400;line-height:1.5;color:#cfe7d8;max-width:840px}
.hl{background:#22c55e;color:#06230f;padding:2px 14px;border-radius:10px;font-weight:600;
  white-space:nowrap;line-height:1.5}
.swipe{font-size:30px;font-weight:600;color:#f6fcf8}
.handle{font-size:26px;font-weight:600;color:#7fae93;letter-spacing:1px}
.tag{font-size:24px;font-weight:600;color:#7fae93}
.btn{display:inline-block;background:#f6fcf8;color:#0e3b24;font-size:34px;font-weight:700;
  padding:26px 52px;border-radius:999px;letter-spacing:0.5px}
.hairline{height:2px;background:#1c5538;margin:38px 0}
.kicker{font-size:34px;font-weight:700;color:#9be8b8;margin-bottom:16px}
.slide.onimg{background-size:cover;background-position:center center}
.slide.onimg .h-cover,.slide.onimg .h-content{text-shadow:0 2px 34px rgba(0,0,0,0.65)}
.slide.onimg .sub{text-shadow:0 2px 20px rgba(0,0,0,0.8);color:#cfe7d8}
.slide.onimg .eyebrow,.slide.onimg .tag,.slide.onimg .handle,.slide.onimg .swipe,.slide.onimg .prog{text-shadow:0 1px 14px rgba(0,0,0,0.9)}
</style></head><body><div class="slide onimg" style="background-image:linear-gradient(180deg,rgba(14,59,36,0.80) 0%,rgba(14,59,36,0.40) 40%,rgba(14,59,36,0.55) 66%,rgba(14,59,36,0.96) 100%),url('../ai-bg/312-cta.png');background-size:cover;background-repeat:no-repeat;background-position:center center">
    <div class="spacer"></div>
    <h1 class="h-cover">Appetite control, <span class="hl">on autopilot</span>.</h1>
    <p class="sub">Snap your meals in Vibe Health to spot eating patterns, and let your daily Health Score connect how you eat to how you feel.</p>
    <div class="hairline" style="max-width:840px"></div>
    <div><span class="btn">Download Vibe Health →</span></div>
    <div class="spacer"></div>
    <div class="row"><span class="handle">@vibehealthapp</span><span class="tag">feel full, eat less</span></div>
  </div></body></html>

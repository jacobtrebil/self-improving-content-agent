<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px}
.slide{width:1080px;height:1350px;background:#0a0a0a;color:#fafafa;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
  padding:0;display:flex;flex-direction:column;position:relative;overflow:hidden;
  -webkit-font-smoothing:antialiased}
.image-bg{width:100%;height:100%;background-size:cover;background-position:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:80px 60px 120px;position:relative}
.overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.3) 30%,rgba(0,0,0,0.6) 100%)}
.content{position:relative;z-index:2;text-align:center;max-width:900px}
.story{font-size:56px;font-weight:800;line-height:1.2;letter-spacing:-1px;margin-bottom:20px;color:#4ade80;text-shadow:0 4px 12px rgba(0,0,0,0.8)}
.emotion{font-size:32px;font-weight:600;color:#86efac;text-shadow:0 2px 8px rgba(0,0,0,0.8)}
.swipe{position:absolute;bottom:60px;right:60px;font-size:30px;font-weight:600;color:#fafafa;z-index:3}
.handle{position:absolute;bottom:60px;left:60px;font-size:26px;font-weight:600;color:#6f6f6f;z-index:3}
</style></head><body><div class="slide" style="background-image:url(after.png);background-size:cover;background-position:center">
    <div class="overlay"></div>
    <div class="content">
      <div class="story">Finally shredded<br>mission accomplished</div>
      <div class="emotion">This is what peak looks like</div>
    </div>
    <span class="swipe">Swipe →</span>
    <span class="handle">@vibehealthapp</span>
  </div></body></html>

<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px}
.slide{width:1080px;height:1350px;background:#0a0a0a;color:#fafafa;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
  padding:60px;display:flex;flex-direction:column;position:relative;overflow:hidden;
  -webkit-font-smoothing:antialiased;align-items:center;justify-content:center}
.app-container{display:flex;align-items:center;justify-content:center;margin-bottom:40px;position:relative}
.app-container img{height:900px;width:auto;border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.app-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:60px 40px;background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,0.4) 50%,rgba(0,0,0,0.7) 100%);border-radius:30px;pointer-events:none}
.tagline{font-size:48px;font-weight:800;letter-spacing:-1px;text-align:center;color:#4ade80;margin-bottom:16px;text-shadow:0 4px 12px rgba(0,0,0,0.8)}
.subtext{font-size:28px;font-weight:600;color:#86efac;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,0.8)}
.swipe{position:absolute;bottom:60px;right:60px;font-size:30px;font-weight:600;color:#fafafa;z-index:3}
.handle{position:absolute;bottom:60px;left:60px;font-size:26px;font-weight:600;color:#6f6f6f;z-index:3}
</style></head><body><div class="slide">
    <div class="app-container">
      <img src="app-screen.png" alt="Vibe Health App">
      <div class="app-overlay">
        <div class="tagline">I transformed</div>
        <div class="subtext">using Vibe Health</div>
      </div>
    </div>
    <span class="swipe">Swipe →</span>
    <span class="handle">@vibehealthapp</span>
  </div></body></html>

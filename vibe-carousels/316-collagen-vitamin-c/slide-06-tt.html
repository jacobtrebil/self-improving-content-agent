<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px}
.slide{width:1080px;height:1920px;background:#f6fcf8;color:#0e3b24;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
  padding:96px;display:flex;flex-direction:column;position:relative;overflow:hidden;
  -webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;justify-content:space-between}
.eyebrow{font-size:24px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:#6f9a7e}
.prog{font-size:24px;font-weight:700;letter-spacing:2px;color:#6f9a7e}
.spacer{flex:1}
.idx{font-size:240px;font-weight:800;line-height:0.85;letter-spacing:-4px;color:#e2f4e9;margin-bottom:8px}
.h-cover{font-size:88px;font-weight:800;line-height:1.04;letter-spacing:-2px}
.h-content{font-size:60px;font-weight:800;line-height:1.08;letter-spacing:-1px;margin-bottom:30px}
.sub{font-size:32px;font-weight:500;line-height:1.45;color:#3f6b50;margin-top:34px;max-width:840px}
.body{font-size:32px;font-weight:400;line-height:1.5;color:#2f5a40;max-width:840px}
.hl{background:#22c55e;color:#06230f;padding:2px 14px;border-radius:10px;font-weight:600;
  white-space:nowrap;line-height:1.5}
.swipe{font-size:30px;font-weight:600;color:#0e3b24}
.handle{font-size:26px;font-weight:600;color:#6f9a7e;letter-spacing:1px}
.tag{font-size:24px;font-weight:600;color:#6f9a7e}
.btn{display:inline-block;background:#0e3b24;color:#f6fcf8;font-size:34px;font-weight:700;
  padding:26px 52px;border-radius:999px;letter-spacing:0.5px}
.hairline{height:2px;background:#cdeeda;margin:38px 0}
.kicker{font-size:34px;font-weight:700;color:#15803d;margin-bottom:16px}
.slide.onimg{background-size:cover;background-position:center center}
.slide.onimg .h-cover,.slide.onimg .h-content{text-shadow:0 2px 34px rgba(255,255,255,0.65)}
.slide.onimg .sub{text-shadow:0 2px 20px rgba(255,255,255,0.8);color:#0e3b24}
.slide.onimg .eyebrow,.slide.onimg .tag,.slide.onimg .handle,.slide.onimg .swipe,.slide.onimg .prog{text-shadow:0 1px 14px rgba(255,255,255,0.9)}
</style></head><body><div class="slide">
    <div class="spacer"></div>
    <div class="idx">05</div>
    <div class="kicker">Be patient</div>
    <h2 class="h-content">Give it weeks</h2>
    <p class="body">This isn't overnight — most studies ran <span class="hl">8 to 12 weeks</span> before measuring changes. Consistency beats dose.</p>
    <div class="spacer"></div>
    <div class="row"><span class="handle">@vibehealthapp</span></div>
  </div></body></html>

# Platform constraints — where each rendered artifact goes and in what shape.

video:   # reels / shorts (vibe-carousels/reels, vibe-carousels/shorts)
  resolution: 1080x1920
  aspect_ratio: "9:16"
  fps: 30
  codec: h264 (libx264, crf 18, yuv420p)
  audio: aac
  duration_seconds: { min: 12, target: 15-20, max: 60 }
  notes:
    - Keep total duration locked to the audio track when re-editing; mux
      audio from the existing final and verify segment sums match.

carousels:   # vibe-carousels/<NN>-<slug> decks, generated from build.js
  # Instagram (the 4:5 set) is retired — every deck renders 9:16 only.
  tiktok:
    aspect_ratio: "9:16"
    css_size: 1080x1920
    final_png: 2160x3840        # 2x retina MASTER — never upload this to TikTok
    file_suffix: "-tt"          # slide-01-tt.png  (node build.js — 9:16 is the only ratio)
    upload_png: 1080x1920       # REQUIRED: downscale the master before posting
    upload_suffix: "-tt1080"    # slide-01-tt1080.png  (bash make_tt1080.sh <deck>)
    # TikTok REJECTS photos over 1080p. The 2x master (2160x3840) fails with:
    #   "Video must be at least 720p, Picture must no exceed 1080p".
    # Scheduling must upload the -tt1080 (1080x1920) copies, not the masters.
  youtube_shorts:
    source: 9:16 PNGs stitched to MP4 via build_shorts.sh (crossfades)
  rule: >
    Every deck renders 9:16 only — TikTok carousel (-tt PNGs, downscaled to
    1080x1920) and YouTube Shorts (MP4 from the same PNGs). The 4:5 Instagram
    set is no longer produced.

platforms:
  tiktok:
    formats: [video, carousel-9:16]
    limits:   # HARD TikTok API rules — violating these fails the whole post
      photo_max_resolution: 1080p   # upload 1080x1920; the 2x master (2160x3840) is REJECTED
      video_min_resolution: 720p    # reels/shorts must be >=720p (our 1080x1920 videos comply)
      observed_error: "An error occurred while posting on tiktok: Video must be at least 720p, Picture must no exceed 1080p"
    settings:   # used by reschedule_tt.sh
      privacy_level: PUBLIC_TO_EVERYONE
      duet: false
      stitch: false
      comment: true
      autoAddMusic: "yes"
      content_posting_method: DIRECT_POST
  youtube:
    formats: [shorts]
    needs: per-video title (see schedule_youtube.sh ROWS for style)

first_frame:
  # The first frame is the cover/thumbnail on every platform.
  - Must satisfy brand.yaml visual_rules.hooks (real visual, no flat color).
  - Must read at thumbnail size: hook text large, high contrast.
